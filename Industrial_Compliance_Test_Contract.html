<?xml version="1.0" encoding="utf-8" standalone="yes"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="794" height="1123"><defs><style type="text/css" /></defs><g transform="scale(1.33333)"><g transform="translate(0.112213135,0)"><rect x="0" y="0" width="595.27557373" height="841.889770508" style="fill: #ffffff; stroke: #000000; stroke-width: 1" /><path d="M0,0 L595.27557373,0 L595.27557373,841.889770508 L0,841.889770508 Z" fill="#ffffff" fill-rule="evenodd" /><text transform="matrix(1,0,0,1,78,96)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="bold" font-style="normal" font-size="18" fill="#000000">MASTER SERVICE AGREEMENT</tspan></text><text transform="matrix(1,0,0,1,78,151.599975586)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="bold" font-style="italic" font-size="12" fill="#000000">Between GlobalIndustrial SA and DataCloud Solutions Inc.</tspan></text><path d="M78,176 L517.275634766,176 " stroke-width="1" stroke-linecap="round" stroke-miterlimit="10" stroke="#000000" fill="none" fill-rule="evenodd" /><text transform="matrix(1,0,0,1,78,224.599975586)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="bold" font-style="normal" font-size="14" fill="#000000">1. Purpose and Scope</tspan></text><text transform="matrix(1,0,0,1,78,276.999969482)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">This Agreement establishes the legal framework governing the provision of artificial</tspan></text><text transform="matrix(1,0,0,1,78,288.999969482)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">intelligence-based</tspan></text><text transform="matrix(1,0,0,1,78,300.999969482)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">contractual compliance analysis services. The Service Provider shall deliver automated analysis of</tspan></text><text transform="matrix(1,0,0,1,78,312.999969482)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">contractual documents, regulatory comparison, clause extraction, risk classification, and</tspan></text><text transform="matrix(1,0,0,1,78,324.999969482)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">compliance</tspan></text><text transform="matrix(1,0,0,1,78,336.999969482)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">reporting. The AI system may process documents originating from multiple jurisdictions, including</tspan></text><text transform="matrix(1,0,0,1,78,348.999969482)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">the European Union, the United States, Canada, and Morocco. The Parties acknowledge that the</tspan></text><text transform="matrix(1,0,0,1,78,360.999969482)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">system</tspan></text><text transform="matrix(1,0,0,1,78,372.999969482)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">operates through probabilistic models and may generate outputs without deterministic guarantees.</tspan></text><text transform="matrix(1,0,0,1,78,422.599975586)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="bold" font-style="normal" font-size="14" fill="#000000">2. Data Hosting and Localization</tspan></text><text transform="matrix(1,0,0,1,78,475)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">All data processed pursuant to this Agreement shall be hosted exclusively on cloud infrastructure</tspan></text><text transform="matrix(1,0,0,1,78,487)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">located within the United States of America. The Service Provider does not guarantee data</tspan></text><text transform="matrix(1,0,0,1,78,499)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">residency</tspan></text><text transform="matrix(1,0,0,1,78,511)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">within the European Union. Cross-border transfers may occur without additional contractual</tspan></text><text transform="matrix(1,0,0,1,78,523)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">safeguards</tspan></text><text transform="matrix(1,0,0,1,78,535)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">beyond standard encryption. The Client acknowledges potential exposure to foreign governmental</tspan></text><text transform="matrix(1,0,0,1,78,547)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">access</tspan></text><text transform="matrix(1,0,0,1,78,559)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">requests under applicable U.S. legislation.</tspan></text><text transform="matrix(1,0,0,1,78,608.599975586)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="bold" font-style="normal" font-size="14" fill="#000000">3. Data Processing and Transfers</tspan></text><text transform="matrix(1,0,0,1,78,661)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">The Service Provider may process personal data, industrial data, and compliance-related</tspan></text><text transform="matrix(1,0,0,1,78,673)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">information</tspan></text><text transform="matrix(1,0,0,1,78,685)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">necessary to perform the Services. Data may be transferred internationally between jurisdictions</tspan></text><text transform="matrix(1,0,0,1,78,697)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">without prior case-by-case approval. No Standard Contractual Clauses or equivalent safeguards</tspan></text><text transform="matrix(1,0,0,1,78,709)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">are</tspan></text><text transform="matrix(1,0,0,1,78,721)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">automatically incorporated unless separately executed in writing.</tspan></text><g><text><tspan xml:space="preserve" style="white-space: pre;" x="20" y="20" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#ff0000">Evaluation Warning : The document was created with Spire.PDF for Python.</tspan></text></g></g></g></svg><br/><?xml version="1.0" encoding="utf-8" standalone="yes"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="794" height="1123"><defs><style type="text/css" /></defs><g transform="scale(1.33333)"><g transform="translate(0.112213135,0)"><rect x="0" y="0" width="595.27557373" height="841.889770508" style="fill: #ffffff; stroke: #000000; stroke-width: 1" /><path d="M0,0 L595.27557373,0 L595.27557373,841.889770508 L0,841.889770508 Z" fill="#ffffff" fill-rule="evenodd" /><text transform="matrix(1,0,0,1,78,92)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="bold" font-style="normal" font-size="14" fill="#000000">4. AI System Operation</tspan></text><text transform="matrix(1,0,0,1,78,144.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">The AI system performs automated interpretation of contractual provisions, regulatory</tspan></text><text transform="matrix(1,0,0,1,78,156.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">cross-referencing,</tspan></text><text transform="matrix(1,0,0,1,78,168.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">and compliance scoring. Outputs may be delivered without prior human validation. The Service</tspan></text><text transform="matrix(1,0,0,1,78,180.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">Provider</tspan></text><text transform="matrix(1,0,0,1,78,192.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">does not guarantee the absence of algorithmic errors, hallucinations, or interpretative</tspan></text><text transform="matrix(1,0,0,1,78,204.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">inconsistencies.</tspan></text><text transform="matrix(1,0,0,1,78,216.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">The Client remains responsible for independent legal verification of automated outputs.</tspan></text><text transform="matrix(1,0,0,1,78,266)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="bold" font-style="normal" font-size="14" fill="#000000">5. Limitation of Liability</tspan></text><text transform="matrix(1,0,0,1,78,318.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">The Service Provider shall not be liable for indirect, consequential, regulatory, or reputational</tspan></text><text transform="matrix(1,0,0,1,78,330.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">damages.</tspan></text><text transform="matrix(1,0,0,1,78,342.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">Direct liability shall be capped at 5,000 USD irrespective of the actual harm incurred. The Client</tspan></text><text transform="matrix(1,0,0,1,78,354.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">assumes</tspan></text><text transform="matrix(1,0,0,1,78,366.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">full responsibility for reliance on AI-generated analyses in regulatory or contractual contexts.</tspan></text><text transform="matrix(1,0,0,1,78,415.999969482)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="bold" font-style="normal" font-size="14" fill="#000000">6. Audit and Transparency</tspan></text><text transform="matrix(1,0,0,1,78,468.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">No contractual right to audit the internal logic, source code, training data, or reasoning mechanisms</tspan></text><text transform="matrix(1,0,0,1,78,480.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">of the AI system is granted. The Service Provider may provide limited descriptive documentation</tspan></text><text transform="matrix(1,0,0,1,78,492.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">but</tspan></text><text transform="matrix(1,0,0,1,78,504.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">is not obligated to disclose full reasoning traces or inference logs.</tspan></text><text transform="matrix(1,0,0,1,78,554)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="bold" font-style="normal" font-size="14" fill="#000000">7. Security Measures</tspan></text><text transform="matrix(1,0,0,1,78,606.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">The Service Provider implements commercially reasonable security controls including encryption in</tspan></text><text transform="matrix(1,0,0,1,78,618.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">transit</tspan></text><text transform="matrix(1,0,0,1,78,630.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">and at rest. Compliance with specific standards such as ISO/IEC 27001 or NIST SP 800-53 is not</tspan></text><text transform="matrix(1,0,0,1,78,642.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">guaranteed</tspan></text><text transform="matrix(1,0,0,1,78,654.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">unless expressly certified. Cybersecurity risks inherent to cloud-based AI services are</tspan></text><text transform="matrix(1,0,0,1,78,666.399963379)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">acknowledged by both Parties.</tspan></text><text transform="matrix(1,0,0,1,78,716)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="bold" font-style="normal" font-size="14" fill="#000000">8. Governing Law</tspan></text><g><text><tspan xml:space="preserve" style="white-space: pre;" x="20" y="20" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#ff0000">Evaluation Warning : The document was created with Spire.PDF for Python.</tspan></text></g></g></g></svg><br/><?xml version="1.0" encoding="utf-8" standalone="yes"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="794" height="1123"><defs><style type="text/css" /></defs><g transform="scale(1.33333)"><g transform="translate(0.112213135,0)"><rect x="0" y="0" width="595.27557373" height="841.889770508" style="fill: #ffffff; stroke: #000000; stroke-width: 1" /><path d="M0,0 L595.27557373,0 L595.27557373,841.889770508 L0,841.889770508 Z" fill="#ffffff" fill-rule="evenodd" /><text transform="matrix(1,0,0,1,78,100)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">This Agreement shall be governed exclusively by the laws of the State of Delaware, United States.</tspan></text><text transform="matrix(1,0,0,1,78,112)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">Any dispute shall be submitted to the competent courts of Delaware. The Parties waive application</tspan></text><text transform="matrix(1,0,0,1,78,124)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">of conflicting jurisdictional rules except where mandatorily imposed.</tspan></text><text transform="matrix(1,0,0,1,78,173.599975586)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="bold" font-style="normal" font-size="14" fill="#000000">9. Termination and Data Retention</tspan></text><text transform="matrix(1,0,0,1,78,226)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">Either Party may terminate this Agreement with thirty days written notice. Upon termination,</tspan></text><text transform="matrix(1,0,0,1,78,238)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">data retention and deletion policies shall be determined by the Service Provider unless</tspan></text><text transform="matrix(1,0,0,1,78,250)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">otherwise required by applicable law. No guaranteed deletion timeframe is provided.</tspan></text><text transform="matrix(1,0,0,1,78,299.599975586)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="bold" font-style="normal" font-size="14" fill="#000000">10. Entire Agreement</tspan></text><text transform="matrix(1,0,0,1,78,351.999969482)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0" font-family="Arial" font-weight="normal" font-style="normal" font-size="10" fill="#000000">This Agreement constitutes the entire understanding between the Parties and supersedes prior</tspan></text><text transform="matrix(1,0,0,1,78,363.999969482)"><tspan xml:space="preserve" style="white-space: pre;" x="0" y="0"
